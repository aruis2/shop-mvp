<div class="max-w-md mx-auto bg-white rounded-lg shadow p-6">
    <h1 class="text-2xl font-bold mb-6">Autentificare</h1>

    {% if error %}
    <div class="mb-4 bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded">
        ❌ {{ error }}
        <a href="{{ base_path }}/login{% if redirect %}?redirect={{ redirect }}{% endif %}" class="ml-4 text-red-800 underline">← înapoi</a>
    </div>
    {% endif %}

    <div id="auth-form">
        <form method="POST" action="{{ base_path }}/login" class="space-y-4">
            <input type="hidden" name="redirect" value="{{ redirect | default(value='') }}">
            <div>
                <label class="block text-sm font-medium mb-1">Email</label>
                <input type="email" name="email" class="w-full border rounded px-3 py-2" required>
            </div>
            <div>
                <label class="block text-sm font-medium mb-1">Parolă</label>
                <input type="password" name="password" class="w-full border rounded px-3 py-2" required>
            </div>
            <button type="submit" class="w-full bg-blue-600 text-white py-2 rounded hover:bg-blue-700">Login</button>
        </form>
    </div>
    <p class="text-center mt-4 text-sm text-gray-500">
        Nu ai cont? <a href="{{ base_path }}/signup?redirect={{ redirect | default(value=base_path ~ '/login') }}" class="text-blue-600"
           >Înregistrează-te</a>
    </p>
</div>
