{% extends "base.html" %}
{% block title %}Autentificare{% endblock %}
{% block head %}<script>if(localStorage.getItem('token')){window.location.href=BASE_PATH+'/';}</script>{% endblock %}
{% block content %}
<div class="max-w-md mx-auto bg-white rounded-lg shadow p-6">
    <h1 class="text-2xl font-bold mb-6">Autentificare</h1>
    <form id="loginForm" class="space-y-4">
        <div>
            <label class="block text-sm font-medium mb-1">Email</label>
            <input type="email" id="email" class="w-full border rounded px-3 py-2" required>
        </div>
        <div>
            <label class="block text-sm font-medium mb-1">Parolă</label>
            <input type="password" id="password" class="w-full border rounded px-3 py-2" required>
        </div>
        <button type="submit" class="w-full bg-blue-600 text-white py-2 rounded hover:bg-blue-700">Login</button>
    </form>
    <p class="text-center mt-4 text-sm text-gray-500">
        Nu ai cont? <a href="{{ base_path }}/signup" class="text-blue-600">Înregistrează-te</a>
    </p>
</div>
<script>
var redirectUrl = new URLSearchParams(window.location.search).get('redirect') || '/';

document.getElementById('loginForm').onsubmit = async (e) => {
    e.preventDefault();
    const res = await fetch(BASE_PATH + '/login', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({email: email.value, password: password.value})
    });
    if (res.ok) {
        const data = await res.json();
        localStorage.setItem('token', data.token);
        localStorage.setItem('user', JSON.stringify(data.user));
        var sep = redirectUrl.includes('?') ? '&' : '?';
        window.location.href = redirectUrl + sep + 'token=' + encodeURIComponent(data.token);
    } else {
        const text = await res.text();
        alert('Eroare: ' + text);
    }
};
</script>
{% endblock %}
